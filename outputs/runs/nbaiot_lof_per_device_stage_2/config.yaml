  test_benign_file: test_benign.parquet
  test_attack_file: test_attack.parquet
  metadata_columns:
    - is_attack
    - attack_family
    - attack_type

thresholds:
  device_1: 2.9840
  device_2: 6.2190
  device_3: 15.4133
