  stage_1_run_dir: outputs/runs/nbaiot_lof_per_device_stage_1

outputs:
  output_dir: outputs/runs/nbaiot_lof_per_device_stage_2
  overwrite: false

devices:
  - device_1
  - device_2
  - device_3
  - device_4
  - device_5
  - device_6
  - device_7
  - device_8
  - device_9

