experiment:
  name: nbaiot_autoencoder_per_device_stage_2
  dataset: nbaiot
  strategy: per_device_autoencoder_optimization
  seed: 42

paths:
  data_dir: data/processed/n_baiot/scaled/per_device

outputs:
  output_dir: outputs/runs/nbaiot_autoencoder_per_device_stage_2
  overwrite: false

runtime:
  log_level: INFO
  gpu_memory_growth: true

devices:
  - device_1
  - device_2
  - device_3
  - device_4
  - device_5
  - device_6
  - device_7
  - device_8
  - device_9

data:
  train_file: train.parquet
  val_file: val.parquet
  metadata_columns:
    - is_attack
    - attack_family
    - attack_type

optimization:
  n_trials: 10
  objective_quantile: 0.99

training:
  epochs: 100
  batch_size: 1024
  verbose: 1
  shuffle_train: true
  shuffle_buffer_size: 50000
  early_stopping:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 10
    min_delta: 0.00001
    restore_best_weights: true

model:
  type: autoencoder
  fixed_params:
    hidden_dims: [64, 32]
    activation: relu
    output_activation: linear
    optimizer: adam
    loss: mse
    reconstruction_error: mse

search_space:
  latent_dim:
    choices: [8, 12, 16, 24, 32]

  learning_rate:
    low: 0.0001
    high: 0.005
    log: true

  dropout_rate:
    low: 0.0
    high: 0.2

  l2_reg:
    low: 0.0
    high: 0.0001
    log: false

  batch_norm:
    choices: [false, true]
